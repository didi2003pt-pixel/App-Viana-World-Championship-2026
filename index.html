                    const pxSize = typeof size === 'number' ? `${size}px` : size;

                    if (!className.includes('h-')) i.style.height = pxSize;
                    spanRef.current.appendChild(i);
                    window.lucide.createIcons({ root: spanRef.current });

                          headers: {
                              'Accept': 'application/json',
                              'Content-Type': 'application/json'

                          body: JSON.stringify({

                      // Simula uma espera para dar tempo de ler "A entrar..." se ainda não tiver o link configurado
                      await new Promise(resolve => setTimeout(resolve, 800));

                  // Guarda o acesso no dispositivo do utilizador

                  setHasAccess(true);

                  setHasAccess(true);

                  setIsSubmitting(false);

              { id: 'race_finals', type: 'race', name: lang === 'pt' ? 'Finais' : 'Finals', description: 'Área reservada Medal Series.', coords: [[41.670146,-8.839606],[41.668041,-8.835275],[41.668890,-8.831358],[41.673116,-8.831389],[41.675537,-8.834998],[41.674686,-8.838955]], iconStr: 'trophy', icon: <MIcon name="trophy" />, color: '#facc15', twColor: 'bg-yellow-400' },
              { id: 'hotel', type: 'logistics', name: 'Hotel Feel Viana', description: 'Alojamento oficial.', coords: [[41.680353,-8.829790],[41.680857,-8.828637],[41.681817,-8.830230],[41.681533,-8.830842]], iconStr: 'building', icon: <MIcon name="building" />, color: '#8b5cf6', twColor: 'bg-purple-600' },
              { id: 'eco_1', type: 'eco', name: 'Eco Station', description: 'Estação de reciclagem.', coords: [[41.678750,-8.831300]], iconStr: 'recycle', icon: <MIcon name="recycle" />, color: '#22c55e', twColor: 'bg-green-500' }
          ], [lang]);

          const kmlLines = [
              { id: 'north_barrier', name: 'North Beach Barrier', color: '#ef4444', coords: [[41.679339,-8.832465],[41.678788,-8.832961]] }
          ];

          const filteredLocations = useMemo(() => {
              if (activeFilters.includes('all')) return kmlLocations;
              return kmlLocations.filter(loc => activeFilters.includes(loc.type));
          }, [activeFilters, kmlLocations]);

          // --- LEAFLET MAP EFFECT ---
          const mapRef = useRef(null);

          useEffect(() => {
              if (activeTab !== 'map' || showSplash || !hasAccess) return;
              const mapId = 'real-map';
              const mapContainer = document.getElementById(mapId);
              if (!mapContainer || !window.L) return;

              if (mapRef.current) { mapRef.current.off(); mapRef.current.remove(); mapRef.current = null; }
              let domContainer = window.L.DomUtil.get(mapId);
              if (domContainer) { domContainer._leaflet_id = null; domContainer.innerHTML = ''; }

              const map = window.L.map(mapId, { zoomControl: false }).setView([41.679, -8.836], 15);
              mapRef.current = map;
              
              window.L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: '© Google' }).addTo(map);

              kmlLines.forEach(line => window.L.polyline(line.coords, { color: line.color, weight: 4, dashArray: '5, 5' }).addTo(map));

              kmlLocations.forEach(loc => {
                  if (loc.coords.length > 2) window.L.polygon(loc.coords, { color: loc.color, fillColor: loc.color, fillOpacity: 0.4, weight: 2 }).addTo(map);
                  let latSum = 0, lngSum = 0;
                  loc.coords.forEach(c => { latSum += c[0]; lngSum += c[1]; });
                  const center = [latSum / loc.coords.length, lngSum / loc.coords.length];
                  
                  const divIcon = window.L.divIcon({
                      className: 'leaflet-div-icon-custom',
                      html: `<div class="${loc.twColor} w-8 h-8 rounded-xl shadow-[0_0_15px_rgba(0,0,0,0.5)] border-2 border-white flex items-center justify-center text-white cursor-pointer hover:scale-110 transition-transform" onclick="window.selectLocGlobal('${loc.id}')"><i data-lucide="${loc.iconStr}" style="width:16px;height:16px;"></i></div>`,
                      iconSize: [32, 32], iconAnchor: [16, 16]
                  });
                  window.L.marker(center, {icon: divIcon}).addTo(map);
              });
              
              setTimeout(() => { if(mapRef.current) mapRef.current.invalidateSize(); if(window.lucide) window.lucide.createIcons(); }, 200);

              return () => {
                  if (mapRef.current) { mapRef.current.off(); mapRef.current.remove(); mapRef.current = null; }
                  let domC = document.getElementById(mapId);
                  if (domC) { domC._leaflet_id = null; domC.innerHTML = ''; }
              };
          }, [activeTab, showSplash, hasAccess, kmlLocations]);

          // --- LEAFLET TRACKING EFFECT ---
          const trackingMapRef = useRef(null);
          const markersRef = useRef({});

          useEffect(() => {
              if (activeTab !== 'tracking' || showSplash || !hasAccess) return;
              
              let timeoutId = setTimeout(() => {
                  const mapId = 'tracking-map';
                  const mapContainer = document.getElementById(mapId);
                  if (!mapContainer || !window.L) return;

                  if (trackingMapRef.current) { trackingMapRef.current.off(); trackingMapRef.current.remove(); trackingMapRef.current = null; }
                  let domContainer = window.L.DomUtil.get(mapId);
                  if (domContainer) { domContainer._leaflet_id = null; domContainer.innerHTML = ''; }
                  
                  const map = window.L.map(mapId, { zoomControl: false }).setView([41.675, -8.855], 14);
                  trackingMapRef.current = map;
                  window.L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: '© Google' }).addTo(map);

                  kmlLines.forEach(line => window.L.polyline(line.coords, { color: line.color, weight: 4, dashArray: '5, 5' }).addTo(map));
                  kmlLocations.filter(loc => loc.type === 'race').forEach(loc => {
                      if (loc.coords.length > 2) window.L.polygon(loc.coords, { color: loc.color, fillColor: loc.color, fillOpacity: 0.4, weight: 2 }).addTo(map);
                  });
                  
                  setTimeout(() => { if(trackingMapRef.current) trackingMapRef.current.invalidateSize(); }, 200);
              }, 100);

              return () => {
                  if (timeoutId) clearTimeout(timeoutId);
                  if (trackingMapRef.current) { trackingMapRef.current.off(); trackingMapRef.current.remove(); trackingMapRef.current = null; markersRef.current = {}; }
                  let domC = document.getElementById('tracking-map');
                  if (domC) { domC._leaflet_id = null; domC.innerHTML = ''; }
              };
          }, [activeTab, showSplash, hasAccess, kmlLocations]);

          useEffect(() => {
              if (activeTab === 'tracking' && trackingMapRef.current && window.L && hasAccess) {
                  const map = trackingMapRef.current;
                  liveAthletes.forEach(a => {
                      if (markersRef.current[a.id]) {
                          markersRef.current[a.id].setLatLng([a.lat, a.lng]);
                      } else {
                          const iconHtml = `<div class="flex flex-col items-center group"><div class="bg-slate-900 text-white text-[9px] font-black px-1.5 py-0.5 rounded shadow-lg whitespace-nowrap mb-1 flex items-center gap-1 group-hover:scale-125 transition-transform border border-slate-700"><span>${a.flag}</span> ${a.sail}</div><div class="w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-[0_0_10px_rgba(239,68,68,0.8)] animate-pulse"></div></div>`;
                          const divIcon = window.L.divIcon({ className: 'leaflet-div-icon-custom', html: iconHtml, iconSize: [40, 40], iconAnchor: [20, 40] });
                          const marker = window.L.marker([a.lat, a.lng], { icon: divIcon }).addTo(map);
                          markersRef.current[a.id] = marker;
                      }
                  });
              }
          }, [liveAthletes, activeTab, hasAccess]);

          useEffect(() => {
              window.selectLocGlobal = (id) => { const loc = kmlLocations.find(l => l.id === id); if(loc) setSelectedPoint(loc); };
          }, [kmlLocations]);

          useEffect(() => {
              if (selectedPoint && window.leafletMap) {
                  let latSum = 0, lngSum = 0;
                  selectedPoint.coords.forEach(c => { latSum += c[0]; lngSum += c[1]; });
                  const center = [latSum / selectedPoint.coords.length, lngSum / selectedPoint.coords.length];
                  window.leafletMap.flyTo(center, 17, { duration: 1.5 });
              }
          }, [selectedPoint]);

          const handleSendChat = async () => { 
             if(!chatInput) return;
             setChatHistory(prev => [...prev, { role: 'user', text: chatInput }]);
             setChatInput(''); setIsTyping(true);
             setTimeout(() => {
                 setChatHistory(prev => [...prev, { role: 'model', text: lang === 'pt' ? 'A Formula Kite é uma classe olímpica de extrema velocidade e tática!' : 'Formula Kite is an extremely fast Olympic class!' }]);
                 setIsTyping(false);
             }, 1500);
          };

          return (
            <div className={isDarkMode ? 'dark' : ''}>
              
              {/* ECRÃ DE SPLASH */}
              {showSplash && (
                  <div className={`absolute inset-0 z-[100] flex flex-col items-center justify-center bg-slate-900 transition-opacity duration-500 ease-in-out ${splashFadeOut ? 'opacity-0' : 'opacity-100'}`}>
                      <img src="image_11335c.png" alt="Formula Kite Logo" className="h-24 md:h-32 lg:h-40 mb-6 animate-pulse object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]" />
                      <h1 className="text-white font-black tracking-[0.2em] text-xl lg:text-2xl uppercase">Viana 2026</h1>
                      <div className="w-40 lg:w-48 h-1 bg-slate-800 rounded-full mt-10 overflow-hidden relative">
                          <div className="absolute top-0 bottom-0 left-0 bg-emerald-500 w-full animate-progress rounded-full"></div>
                      </div>
                  </div>
              )}

              {/* ECRÃ DE LOGIN (APARECE SE NÃO HOUVER ACESSO) */}
              {!showSplash && !hasAccess && (
                  <div className="absolute inset-0 z-[90] bg-slate-900 flex flex-col items-center justify-center p-4">
                      <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-8 md:p-10 rounded-3xl shadow-2xl w-full max-w-md relative z-10 animate-in fade-in slide-in-from-bottom-8 duration-700">
                          <div className="flex flex-col items-center mb-8 text-center">
                              <img src="image_11335c.png" alt="Logo" className="h-16 mb-4 object-contain drop-shadow-md" />
                              <h2 className="text-2xl font-black text-white tracking-tight">{t.loginTitle}</h2>
                              <p className="text-slate-300 text-sm mt-2">{t.loginSub}</p>
                          </div>

                          <form onSubmit={handleLogin} className="space-y-5">
                              <div>
                                  <label className="block text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1.5">{t.nameLabel}</label>
                                  <input type="text" required value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="Ex: João Silva" />
                              </div>
                              <div>
                                  <label className="block text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1.5">{t.emailLabel}</label>
                                  <input type="email" required value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl py-3 px-4 focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="joao@email.com" />
                              </div>
                              <button type="submit" disabled={isSubmitting} className="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-bold py-3.5 rounded-xl shadow-lg mt-4 flex justify-center items-center gap-2">
                                  {isSubmitting ? t.entering : t.enterBtn}
                              </button>
                          </form>
                      </div>
                  </div>
              )}

              {/* CONTEÚDO PRINCIPAL (APARECE SE HOUVER ACESSO) */}
              {!showSplash && hasAccess && (
                  <div className="flex flex-col h-[100dvh] bg-slate-50 dark:bg-slate-950 font-sans text-slate-900 dark:text-slate-100 overflow-hidden relative">
                      <header className="bg-slate-900 dark:bg-black text-white z-40 shadow-xl shrink-0 flex flex-col relative">
                          <div className="px-4 py-3 lg:px-6 lg:py-4 flex flex-col lg:flex-row lg:items-center justify-between gap-3 border-b border-slate-800">
                              <div className="flex items-center justify-between w-full lg:w-auto">
                                  <div className="flex items-center gap-3">
                                      <img src="image_11335c.png" alt="Logo" className="h-12 object-contain" />
                                      <div>
                                          <h1 className="text-base font-black tracking-tight leading-none uppercase">2026 Formula Kite</h1>
                                          <p className="text-[10px] text-emerald-400 font-bold uppercase mt-1">Viana do Castelo 🇵🇹</p>
                                      </div>
                                  </div>
                              </div>
                              <nav className="flex bg-white/5 p-1.5 rounded-xl border border-white/10 gap-1 overflow-x-auto no-scrollbar w-full lg:w-auto">
                                  {[ { id: 'tracking', label: t.tabTracking }, { id: 'map', label: t.tabMap }, { id: 'results', label: t.tabResults }, { id: 'athletes', label: t.tabAthletes }, { id: 'hotel', label: t.tabHotel }, { id: 'schedule', label: t.tabSchedule }, { id: 'ai', label: t.tabAI }, { id: 'settings', label: t.tabSettings } ].map(tab => (
                                      <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`shrink-0 px-3 py-2 rounded-lg text-[10px] font-bold ${activeTab === tab.id ? 'bg-emerald-500 text-white' : 'text-slate-300 hover:text-white'}`}>
                                          {tab.label}
                                      </button>
                                  ))}
                              </nav>
                          </div>
                      </header>

                      <div className={`flex-1 flex overflow-hidden ${activeTab === 'map' || activeTab === 'tracking' ? 'flex-col lg:flex-row' : 'flex-col'}`}>
                          
                          {/* TAB: MAPA */}
                          {activeTab === 'map' && (
                              <>
                                  <main className="flex-none h-[50vh] lg:h-auto lg:flex-1 relative bg-slate-900">
                                      <div id="real-map" className="w-full h-full absolute inset-0"></div>
                                  </main>
                                  <aside className="flex-1 lg:flex-none w-full lg:w-[350px] bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 flex flex-col z-20">
                                      <div className="p-4 border-b border-slate-100 dark:border-slate-800">
                                          <h3 className="font-black text-slate-800 dark:text-white">{t.poiTitle}</h3>
                                      </div>
                                      <div className="flex-1 overflow-y-auto p-4 space-y-2">
                                          {filteredLocations.map(loc => (
                                              <button key={loc.id} onClick={() => setSelectedPoint(loc)} className="w-full p-3 rounded-xl border border-slate-100 dark:border-slate-700 flex items-center gap-3 text-left">
                                                  <div className={`w-10 h-10 rounded-lg ${loc.twColor} flex items-center justify-center text-white`}>
                                                      {React.cloneElement(loc.icon, { className: "w-5 h-5" })}
                                                  </div>
                                                  <div>
                                                      <h4 className="font-bold text-xs text-slate-800 dark:text-white">{loc.name}</h4>
                                                      <p className="text-[10px] text-slate-500">{loc.type.toUpperCase()}</p>
                                                  </div>
                                              </button>
                                          ))}
                                      </div>
                                  </aside>
                              </>
                          )}

                          {/* TAB: TRACKING */}
                          {activeTab === 'tracking' && (
                              <>
                                  <main className="flex-none h-[50vh] lg:h-auto lg:flex-1 relative bg-slate-900">
                                      <div id="tracking-map" className="w-full h-full absolute inset-0"></div>
                                  </main>
                                  <aside className="flex-1 lg:flex-none w-full lg:w-[350px] bg-white dark:bg-slate-900 border-l border-slate-200 dark:border-slate-800 flex flex-col z-20">
                                      <div className="p-4 border-b border-slate-100 dark:border-slate-800">
                                          <h2 className="text-lg font-black text-slate-800 dark:text-white flex items-center gap-2">Live Leaderboard</h2>
                                      </div>
                                      <div className="flex-1 overflow-y-auto p-4">
                                          <table className="w-full text-left text-sm">
                                              <thead>
                                                  <tr className="text-[10px] text-slate-400 uppercase"><th className="pb-2">POS</th><th className="pb-2">NAME</th><th className="pb-2 text-right">SPEED</th></tr>
                                              </thead>
                                              <tbody>
                                                  {liveAthletes.sort((a,b)=>a.pos-b.pos).map(a => (
                                                      <tr key={a.id} className="border-b border-slate-100 dark:border-slate-800">
                                                          <td className="py-3 font-black">{a.pos}</td>
                                                          <td className="py-3 font-bold">{a.name} <span className="text-[10px] bg-slate-100 dark:bg-slate-800 px-1 py-0.5 rounded">{a.country}</span></td>
                                                          <td className="py-3 text-right text-emerald-500 font-bold">{a.speed}kt</td>
                                                      </tr>
                                                  ))}
                                              </tbody>
                                          </table>
                                      </div>
                                  </aside>
                              </>
                          )}

                          {/* TAB: RESULTS */}
                          {activeTab === 'results' && (
                              <div className="flex-1 overflow-y-auto p-6 lg:p-12">
                                  <h2 className="text-2xl font-black mb-6">{t.tabResults}</h2>
                                  <div className="bg-white dark:bg-slate-900 rounded-2xl shadow border border-slate-200 dark:border-slate-800 overflow-hidden">
                                      <table className="w-full text-left">
                                          <thead>
                                              <tr className="bg-slate-50 dark:bg-slate-800/50 text-xs text-slate-500"><th className="p-4">POS</th><th className="p-4">NATION</th><th className="p-4">ATHLETE</th><th className="p-4 text-right">POINTS</th></tr>
                                          </thead>
                                          <tbody>
                                              {resultsOverall.map((ath, idx) => (
                                                  <tr key={idx} className="border-t border-slate-100 dark:border-slate-800">
                                                      <td className="p-4 font-black">{ath.pos}</td>
                                                      <td className="p-4">{ath.flag} {ath.nat}</td>
                                                      <td className="p-4 font-bold">{ath.name}</td>
                                                      <td className="p-4 text-right font-bold text-emerald-500">{ath.net}</td>
                                                  </tr>
                                              ))}
                                          </tbody>
                                      </table>
                                  </div>
                              </div>
                          )}

                          {/* TAB: ATHLETES */}
                          {activeTab === 'athletes' && (
                              <div className="flex-1 overflow-y-auto p-6 lg:p-12">
                                  <h2 className="text-2xl font-black mb-6">{t.tabAthletes}</h2>
                                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                      {athleteProfiles.map((ath, idx) => (
                                          <div key={idx} className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow border border-slate-200 dark:border-slate-800 flex flex-col items-center">
                                              <div className="text-4xl mb-4">{ath.flag}</div>
                                              <h3 className="font-bold text-lg">{ath.name}</h3>
                                              <p className="text-xs text-slate-500">{ath.nat} | {t.athRank} #{ath.rank}</p>
                                          </div>
                                      ))}
                                  </div>
                              </div>
                          )}

                          {/* TAB: HOTEL */}
                          {activeTab === 'hotel' && (
                              <div className="flex-1 overflow-y-auto p-6 lg:p-12">
                                  <h2 className="text-2xl font-black mb-6">{t.tabHotel}</h2>
                                  <div className="bg-slate-900 rounded-2xl p-8 text-white max-w-2xl">
                                      <h3 className="text-3xl font-black text-emerald-400 mb-2">{t.hotelName}</h3>
                                      <p className="mb-6">{t.hotelDesc}</p>
                                      <a href="https://feelviana.com/" target="_blank" className="bg-emerald-500 px-6 py-3 rounded-lg font-bold">Visitar Site</a>
                                  </div>
                              </div>
                          )}

                          {/* TAB: SCHEDULE */}
                          {activeTab === 'schedule' && (
                              <div className="flex-1 overflow-y-auto p-6 lg:p-12">
                                  <h2 className="text-2xl font-black mb-6">{t.tabSchedule}</h2>
                                  <div className="space-y-4 max-w-3xl">
                                      {eventSchedule.map((item, idx) => (
                                          <div key={idx} className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow border border-slate-200 dark:border-slate-800 flex items-center justify-between">
                                              <div>
                                                  <span className="font-black text-lg text-emerald-500">{item.date}</span>
                                                  <h4 className="font-bold">{item.activity}</h4>
                                              </div>
                                              <div className="text-right text-sm text-slate-500 font-bold">{item.time}</div>
                                          </div>
                                      ))}
                                  </div>
                              </div>
                          )}

                          {/* TAB: AI */}
                          {activeTab === 'ai' && (
                              <div className="flex-1 flex flex-col bg-slate-100 dark:bg-slate-900">
                                  <div className="flex-1 p-6 overflow-y-auto space-y-4">
                                      {chatHistory.map((msg, index) => (
                                          <div key={index} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                              <div className={`p-4 rounded-2xl max-w-[80%] ${msg.role === 'user' ? 'bg-slate-800 text-white' : 'bg-emerald-100 dark:bg-emerald-900/50 text-emerald-900 dark:text-white'}`}>
                                                  {msg.text}
                                              </div>
                                          </div>
                                      ))}
                                  </div>
                                  <div className="p-4 bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex gap-2">
                                      <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleSendChat()} className="flex-1 bg-slate-100 dark:bg-slate-900 rounded-xl px-4 py-3 outline-none" placeholder={t.aiPlaceholder} />
                                      <button onClick={handleSendChat} className="bg-emerald-500 text-white px-6 rounded-xl font-bold">Enviar</button>
                                  </div>
                              </div>
                          )}

                          {/* TAB: SETTINGS */}
                          {activeTab === 'settings' && (
                              <div className="flex-1 overflow-y-auto p-6 lg:p-12">
                                  <h2 className="text-2xl font-black mb-6">{t.tabSettings}</h2>
                                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl">
                                      <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow border border-slate-200 dark:border-slate-800">
                                          <h3 className="font-bold mb-4">{t.settingsLang}</h3>
                                          <div className="flex gap-4">
                                              <button onClick={() => setLang('pt')} className={`flex-1 py-3 rounded-lg border-2 ${lang === 'pt' ? 'border-emerald-500' : 'border-transparent bg-slate-100 dark:bg-slate-800'}`}>🇵🇹 PT</button>
                                              <button onClick={() => setLang('en')} className={`flex-1 py-3 rounded-lg border-2 ${lang === 'en' ? 'border-emerald-500' : 'border-transparent bg-slate-100 dark:bg-slate-800'}`}>🇬🇧 EN</button>
                                          </div>
                                      </div>
                                      <div className="bg-white dark:bg-slate-900 p-6 rounded-2xl shadow border border-slate-200 dark:border-slate-800">
                                          <h3 className="font-bold mb-4">{t.settingsTheme}</h3>
                                          <div className="flex gap-4">
                                              <button onClick={() => setIsDarkMode(false)} className={`flex-1 py-3 rounded-lg border-2 ${!isDarkMode ? 'border-emerald-500' : 'border-transparent bg-slate-100 dark:bg-slate-800'}`}>{t.themeLight}</button>
                                              <button onClick={() => setIsDarkMode(true)} className={`flex-1 py-3 rounded-lg border-2 ${isDarkMode ? 'border-emerald-500' : 'border-transparent bg-slate-100 dark:bg-slate-800'}`}>{t.themeDark}</button>
                                          </div>
                                      </div>
                                  </div>
                              </div>
                          )}

                      </div>
                  </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
