<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - 2026 Formula Kite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <div class="absolute inset-0 bg-[url(image_11335c.png)] bg-cover bg-center opacity-20"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-slate-950 to-transparent"></div>

    <div class="max-w-md w-full bg-slate-900/90 backdrop-blur-md border border-slate-800 rounded-3xl p-8 shadow-2xl relative z-10">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center rotate-3 shadow-lg shadow-blue-500/20">
                <i data-lucide="wind" class="text-white w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Acesso Exclusivo</h2>
            <p class="text-slate-400 text-sm">Registe-se para aceder ao Mundial de 2026</p>
        </div>

        <form action="https://formsubmit.co/drprofissional016@gmail.com" method="POST" id="acessoForm" class="space-y-5">
            <!-- ATUALIZADO: Redireciona para o index.html correto do novo repositório após o envio -->
            <input type="hidden" name="_next" value="https://didi2003pt-pixel.github.io/App-Viana-World-Championship-2026/index.html">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="Novo Registo na App Formula Kite!">

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">Nome Completo</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-3.5 text-slate-500 w-5 h-5"></i>
                    <input type="text" name="Nome" required class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Ex: João Silva">
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">E-mail</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-3.5 text-slate-500 w-5 h-5"></i>
                    <input type="email" name="Email" required class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-12 pr-4 py-3 text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="teu@email.com">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all flex items-center justify-center gap-2 mt-4 shadow-lg shadow-blue-600/20">
                Entrar na App
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('acessoForm').addEventListener('submit', function() {
            localStorage.setItem('acesso_permitido', 'sim');
        });
    </script>
</body>
</html>
